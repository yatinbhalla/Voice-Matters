<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trust Metrics — Voice Matters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Same color tokens as the prototype app */
      --bg: #F0F4F8;
      --navy: #1B2A41;
      --primary: #2A9DB5;
      --primary-tint: rgba(42,157,181,0.10);
      --line: #E1E7ED;
      --muted: #8896A6;
      --muted-2: #6A7787;
      --green: #4CAF50;
      --green-tint: #E8F5E9;
      --green-line: #C6E5C9;
      --amber: #F57C00;
      --amber-tint: #FFF4E0;
      --amber-line: #FFD08B;
      --accent: #E53935;
      --accent-tint: #FFEBEE;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--navy);
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 1100px; margin: 0 auto;
      padding: 40px 24px 60px;
    }
    /* Top-left "back to app" pill so mobile users always have a clear way
       out of /admin.html without relying on the browser's back button. */
    .back-pill {
      position: fixed; top: 14px; left: 14px; z-index: 60;
      display: inline-flex; align-items: center; gap: 6px;
      height: 38px; padding: 0 14px; border-radius: 999px;
      background: #fff; border: 1px solid var(--line);
      color: var(--navy); font: 600 13px 'Inter', sans-serif;
      text-decoration: none; box-shadow: 0 6px 16px -8px rgba(20,30,50,.18);
      transition: transform .12s, background .15s; cursor: pointer;
    }
    .back-pill:hover { transform: translateY(-1px); background: var(--bg); }
    .back-pill svg { width: 14px; height: 14px; }
    @media (max-width: 640px) {
      .wrap { padding: 64px 14px 40px; }
      .hdr { flex-direction: column; align-items: flex-start; gap: 12px; margin-bottom: 18px; }
      .hdr h1 { font-size: 22px; }
      .hdr .meta { text-align: left; }
      .grid { gap: 12px; }
      .card { padding: 16px 18px; border-radius: 14px; }
      .card .value { font-size: 30px; margin: 6px 0 4px; }
      .card .badge { top: 12px; right: 12px; padding: 3px 8px; font-size: 10px; }
      .refresh-btn { width: 100%; padding: 10px 14px; margin-top: 10px; }
    }

    /* ═══════ Viewport simulator parity ═══════
       The main app stores its chosen viewport in localStorage.vm_viewport.
       admin.html reads that on load and applies a matching layout so when
       the user clicks "Trust metrics" while in Mobile mode, this screen
       also renders inside a 430px mobile card. */
    body[data-viewport="mobile"] {
      background: #E7EDF3;
      display: flex; flex-direction: column; align-items: center;
      padding: 5dvh 0 0;
    }
    body[data-viewport="mobile"] .back-pill { position: absolute; top: calc(5dvh + 12px); left: calc(50% - 215px + 12px); }
    body[data-viewport="mobile"] .wrap {
      max-width: 430px; width: 430px;
      height: 90dvh; overflow-y: auto; -webkit-overflow-scrolling: touch;
      background: var(--bg); border-radius: 24px;
      box-shadow: 0 24px 60px -16px rgba(20,30,50,.25);
      padding: 60px 18px 36px;
      position: relative;
    }
    body[data-viewport="mobile"] .hdr { flex-direction: column; align-items: flex-start; gap: 12px; margin-bottom: 18px; }
    body[data-viewport="mobile"] .hdr h1 { font-size: 22px; }
    body[data-viewport="mobile"] .hdr .meta { text-align: left; }
    body[data-viewport="mobile"] .grid { grid-template-columns: 1fr !important; gap: 12px; }
    body[data-viewport="mobile"] .card { padding: 16px 18px; border-radius: 14px; }
    body[data-viewport="mobile"] .card .value { font-size: 30px; margin: 6px 0 4px; }
    body[data-viewport="mobile"] .refresh-btn { width: 100%; padding: 10px 14px; margin-top: 10px; }

    body[data-viewport="tablet"] {
      background: #E7EDF3; padding: 24px 0 0;
      display: flex; flex-direction: column; align-items: center;
    }
    body[data-viewport="tablet"] .back-pill { position: absolute; top: 36px; left: calc(50% - 450px + 14px); }
    body[data-viewport="tablet"] .wrap {
      max-width: 900px; width: 900px;
      height: calc(100dvh - 48px); overflow-y: auto;
      background: var(--bg); border-radius: 18px;
      box-shadow: 0 24px 60px -16px rgba(20,30,50,.18);
      padding: 40px 28px 40px;
    }
    body[data-viewport="tablet"] .grid { grid-template-columns: repeat(2, 1fr); }
    /* desktop = default — no overrides needed */

    /* Floating viewport switcher (parity with the main app's vp-fab) */
    .vp-fab {
      position: fixed; bottom: 20px; right: 24px; z-index: 70;
      display: flex; align-items: center; gap: 6px;
      height: 36px; padding: 0 12px; border-radius: 999px;
      background: rgba(27,42,65,.92); color: #fff;
      font: 700 12.5px 'Inter', sans-serif; cursor: pointer; border: none;
      box-shadow: 0 8px 22px -8px rgba(20,30,50,.45);
    }
    .vp-fab svg { width: 15px; height: 15px; }
    .vp-menu {
      position: fixed; bottom: 64px; right: 24px; z-index: 71;
      width: 200px; background: #fff; border: 1px solid var(--line);
      border-radius: 14px; box-shadow: 0 18px 44px -22px rgba(20,30,50,.28);
      padding: 6px; display: none;
    }
    .vp-menu.open { display: block; }
    .vp-menu button {
      display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 10px 11px; border-radius: 9px; font: 600 13px 'Inter', sans-serif;
      color: var(--navy); background: none; border: none; cursor: pointer; text-align: left;
    }
    .vp-menu button:hover { background: var(--bg); }
    .vp-menu button[aria-pressed="true"] { background: rgba(42,157,181,.12); color: var(--primary); }
    @media (max-width: 480px) {
      body[data-viewport="mobile"] .back-pill { left: 12px; }
      body[data-viewport="mobile"] .wrap { width: 100%; max-width: 100vw; height: 100dvh; border-radius: 0; }
      .vp-fab { bottom: 14px; right: 14px; height: 32px; padding: 0 10px; font-size: 11.5px; }
    }
    header.hdr {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 28px; gap: 16px; flex-wrap: wrap;
    }
    .hdr h1 {
      margin: 0; font-size: 26px; letter-spacing: -0.02em;
    }
    .hdr .eyebrow {
      font-size: 11px; font-weight: 700; color: var(--primary);
      letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 4px;
    }
    .hdr .sub {
      margin: 4px 0 0; font-size: 13px; color: var(--muted-2);
    }
    .hdr .meta {
      text-align: right; font-size: 12px; color: var(--muted-2);
      line-height: 1.6;
    }
    .hdr .meta strong { color: var(--navy); font-weight: 600; }
    .hdr .live-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: var(--green);
      box-shadow: 0 0 0 0 rgba(76,175,80,0.5);
      animation: pulse 2s infinite; margin-right: 6px;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(76,175,80,0.5); }
      70%  { box-shadow: 0 0 0 10px rgba(76,175,80,0); }
      100% { box-shadow: 0 0 0 0 rgba(76,175,80,0); }
    }
    .grid {
      display: grid; gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    .card {
      background: #fff; border: 1px solid var(--line);
      border-radius: 16px; padding: 20px 22px;
      box-shadow: 0 4px 12px -6px rgba(20,30,50,0.08);
      position: relative; overflow: hidden;
    }
    .card .label {
      font-size: 11px; font-weight: 600; color: var(--muted-2);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .card .value {
      font-size: 38px; font-weight: 700; margin: 10px 0 4px;
      letter-spacing: -0.02em; font-variant-numeric: tabular-nums;
    }
    .card .target {
      font-size: 12px; color: var(--muted-2);
    }
    .card .target strong { color: var(--navy); font-weight: 600; }
    .card .badge {
      position: absolute; top: 16px; right: 16px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; gap: 4px;
    }
    .card.pass .badge { background: var(--green-tint); color: var(--green); border: 1px solid var(--green-line); }
    .card.fail .badge { background: var(--accent-tint); color: var(--accent); border: 1px solid #F5C4BC; }
    .card.pass .stripe { background: var(--green); }
    .card.fail .stripe { background: var(--accent); }
    .stripe {
      position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    }
    .empty {
      text-align: center; padding: 40px 20px;
      background: #fff; border: 1px solid var(--line); border-radius: 16px;
      color: var(--muted-2);
    }
    footer.foot {
      margin-top: 24px; text-align: center;
      font-size: 11px; color: var(--muted);
    }
    .refresh-btn {
      background: #fff; border: 1px solid var(--line);
      border-radius: 10px; padding: 8px 14px;
      font: 600 12px 'Inter', sans-serif; color: var(--navy);
      cursor: pointer;
    }
    .refresh-btn:hover { border-color: var(--primary); color: var(--primary); }
    .err {
      background: var(--amber-tint); border: 1px solid var(--amber-line);
      color: var(--amber); border-radius: 12px; padding: 12px 16px;
      font-size: 12px; margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <!-- Explicit back-to-app pill. Uses window.location.assign to hard-
       navigate so any cached browser-back state pointing at the archived
       _legacy_prototype.html is bypassed entirely. -->
  <button class="back-pill" type="button" onclick="goToApp()" aria-label="Wapas app par">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    <span>Wapas app par</span>
  </button>

  <!-- Viewport switcher (parity with the main app). -->
  <button id="vp-fab" class="vp-fab" type="button" title="Viewport switcher">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="14" rx="2"/><line x1="8" y1="20" x2="16" y2="20"/></svg>
    <span id="vp-label">Auto</span>
  </button>
  <div id="vp-menu" class="vp-menu" role="menu">
    <button type="button" data-vp="auto">Auto · Window size</button>
    <button type="button" data-vp="mobile">Mobile · ≤480px</button>
    <button type="button" data-vp="tablet">Tablet · 768–1023</button>
    <button type="button" data-vp="desktop">Desktop · ≥1024px</button>
  </div>
  <div class="wrap">
    <header class="hdr">
      <div>
        <div class="eyebrow">Voice Matters · Sarkari Saathi</div>
        <h1>Trust Metrics</h1>
        <p class="sub">Live KPIs over the last <span id="window-size">100</span> assistant turns</p>
      </div>
      <div class="meta">
        <div><span class="live-dot"></span>Auto-refresh · 30s</div>
        <div>Last update: <strong id="updated-at">—</strong></div>
        <div>Sample size: <strong id="sample-size">—</strong></div>
        <button class="refresh-btn" onclick="loadMetrics()" style="margin-top:8px;">Refresh now</button>
      </div>
    </header>

    <div id="err-box"></div>
    <div class="grid" id="metrics-grid">
      <div class="empty">Loading metrics…</div>
    </div>

    <footer class="foot">
      <span id="api-base">/api/v1/admin/trust-metrics</span>
      · <a href="/index.html#/home" style="color:inherit;">← back to app</a>
    </footer>
  </div>

  <script>
    // API base: same origin for production, localhost:8000 in dev (mirrors VM_CONFIG).
    const API_BASE = location.hostname === 'localhost'
      ? 'http://localhost:8000/api/v1'
      : '/api/v1';
    document.getElementById('api-base').textContent = API_BASE + '/admin/trust-metrics';

    const LABELS = {
      hallucination_rate:         { name: 'Hallucination rate', fmt: 'pct' },
      eligibility_false_positive: { name: 'Eligibility false-positive', fmt: 'pct' },
      comprehension_pass_rate:    { name: 'Comprehension pass rate', fmt: 'pct' },
      refusal_rate:               { name: 'Refusal rate', fmt: 'pct' },
      e2e_latency_p95_ms:         { name: 'p95 latency', fmt: 'ms' },
      citation_rate:              { name: 'Citation rate', fmt: 'pct' },
    };

    function fmt(value, kind) {
      if (kind === 'ms') return Math.round(value).toLocaleString() + ' ms';
      if (kind === 'pct') return (value * 100).toFixed(1) + '%';
      return String(value);
    }

    function targetFmt(target, kind) {
      if (kind === 'ms') return Math.round(target).toLocaleString() + ' ms';
      if (kind === 'pct') return (target * 100).toFixed(0) + '%';
      return String(target);
    }

    function direction(dir) {
      return dir === 'lte' ? '≤' : '≥';
    }

    function renderCards(payload) {
      const grid = document.getElementById('metrics-grid');
      document.getElementById('window-size').textContent = payload.sample_size || '—';
      document.getElementById('sample-size').textContent = payload.sample_size || '0';
      document.getElementById('updated-at').textContent =
        new Date().toLocaleTimeString();
      const metrics = payload.metrics || {};
      const order = [
        'hallucination_rate',
        'eligibility_false_positive',
        'comprehension_pass_rate',
        'refusal_rate',
        'e2e_latency_p95_ms',
        'citation_rate',
      ];
      grid.innerHTML = '';
      if (!payload.sample_size) {
        grid.innerHTML = '<div class="empty">No turns recorded yet. Run a voice or chat query in the app, then refresh.</div>';
        return;
      }
      for (const key of order) {
        const m = metrics[key];
        if (!m) continue;
        const meta = LABELS[key];
        const card = document.createElement('div');
        card.className = 'card ' + (m.pass ? 'pass' : 'fail');
        card.innerHTML =
          '<span class="stripe"></span>' +
          '<span class="badge">' + (m.pass ? '✓ PASS' : '✗ FAIL') + '</span>' +
          '<div class="label">' + meta.name + '</div>' +
          '<div class="value">' + fmt(m.value, meta.fmt) + '</div>' +
          '<div class="target">Target: <strong>' +
            direction(m.direction) + ' ' + targetFmt(m.target, meta.fmt) +
          '</strong></div>';
        grid.appendChild(card);
      }
    }

    async function loadMetrics() {
      const errBox = document.getElementById('err-box');
      errBox.innerHTML = '';
      try {
        const r = await fetch(API_BASE + '/admin/trust-metrics', { cache: 'no-store' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        renderCards(data);
      } catch (err) {
        errBox.innerHTML =
          '<div class="err">Could not load metrics: ' + err.message +
          '. Make sure the backend is running on :8000.</div>';
      }
    }

    loadMetrics();
    setInterval(loadMetrics, 30000);

    /* ───────── Back-to-app navigation ─────────
       Build the destination URL from window.location.origin so we never
       inherit a stale browser-history entry to the legacy prototype. */
    function goToApp() {
      const url = window.location.origin + '/index.html#/home';
      window.location.assign(url);
    }

    /* ───────── Viewport simulator ─────────
       Reads the same localStorage key (vm_viewport) the main app writes,
       so when the user picks "Mobile" in the app and then opens Trust
       Metrics, this screen also renders in mobile sim. */
    (function vpInit(){
      const fab = document.getElementById('vp-fab');
      const menu = document.getElementById('vp-menu');
      const label = document.getElementById('vp-label');
      const LABEL = {auto:'Auto', mobile:'Mobile', tablet:'Tablet', desktop:'Desktop'};
      function apply(vp){
        if(vp === 'auto'){ document.body.removeAttribute('data-viewport'); }
        else { document.body.setAttribute('data-viewport', vp); }
        label.textContent = LABEL[vp] || 'Auto';
        menu.querySelectorAll('[data-vp]').forEach(b=>{
          b.setAttribute('aria-pressed', b.dataset.vp === vp ? 'true' : 'false');
        });
        try{ localStorage.setItem('vm_viewport', vp); }catch(e){}
      }
      fab.addEventListener('click', (e)=>{
        e.stopPropagation();
        menu.classList.toggle('open');
      });
      menu.querySelectorAll('[data-vp]').forEach(b=>{
        b.addEventListener('click',(e)=>{
          e.stopPropagation();
          apply(b.dataset.vp);
          menu.classList.remove('open');
        });
      });
      document.addEventListener('click',(e)=>{
        if(!menu.contains(e.target) && e.target !== fab){ menu.classList.remove('open'); }
      });
      // Inherit the viewport choice from the main app.
      let saved = 'auto';
      try{ saved = localStorage.getItem('vm_viewport') || 'auto'; }catch(e){}
      apply(saved);
    })();
  </script>
</body>
</html>
