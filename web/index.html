<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="vm-api-base" content="http://127.0.0.1:8000/api/v1">
<meta name="theme-color" content="#2A9DB5">
<title>Voice Matters · Sarkari Saathi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ════════════════ TOKENS ════════════════ */
:root{
  --primary:#2A9DB5; --primary-d:#1F7C90; --primary-tint:#EAF3F7; --primary-soft:rgba(42,157,181,0.12);
  --accent:#E8735A; --accent-soft:rgba(232,115,90,0.12);
  --navy:#1B2A41; --text:#2E3A4B;
  --muted:#8896A6; --muted-2:#6A7787;
  --line:#E3E9EF; --bg:#F0F4F8; --bg-2:#E7EDF3; --white:#FFFFFF;
  --green:#3E9E52; --green-tint:#E8F5E9; --green-line:#C6E5C9;
  --amber:#C77A14; --amber-tint:#FFF1DE; --amber-line:#F2D8B0;
  --red:#D8413A; --red-tint:#FCEDEC; --red-line:#F2C9C6;
  --gold:#C99A2E; --gold-tint:#FBF3DE;
  --r-s:10px; --r-m:14px; --r-l:18px; --r-xl:22px;
  --sh-1:0 1px 3px rgba(20,30,50,0.05);
  --sh-2:0 2px 6px rgba(20,30,50,0.05), 0 14px 30px -18px rgba(20,30,50,0.16);
  --sh-3:0 18px 44px -22px rgba(20,30,50,0.28);
  --sb:env(safe-area-inset-bottom,0px); --st:env(safe-area-inset-top,0px);
  --tabh:72px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg); color:var(--text);
  -webkit-font-smoothing:antialiased; line-height:1.45;
  overflow-x:hidden;
}
.hi{font-family:'Noto Sans Devanagari','Inter',sans-serif}
button,input,textarea{font-family:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
ul{list-style:none}
:focus-visible{outline:2.5px solid var(--primary);outline-offset:2px;border-radius:4px}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
::selection{background:var(--primary-soft)}

/* ════════════════ ANIMATIONS ════════════════ */
@keyframes ringPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:var(--o,.3)}50%{transform:translate(-50%,-50%) scale(1.12);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes wavebar{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes blink{0%,55%{opacity:1}56%,100%{opacity:.25}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes confettiFall{to{transform:translateY(640px) rotate(var(--rot,360deg));opacity:0}}
@keyframes dotPulse{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.05ms!important}}

/* ════════════════ APP SHELL ════════════════ */
#app{display:grid;grid-template-columns:1fr;min-height:100dvh}
#sidebar{display:none}
#frame{display:flex;flex-direction:column;min-width:0;min-height:100dvh;position:relative}
#appbar{display:none}
#view{flex:1;min-width:0;position:relative;animation:fadeIn .25s ease}
#tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:60;
  height:calc(var(--tabh) + var(--sb));padding-bottom:var(--sb);
  background:rgba(255,255,255,.94);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
  display:flex;align-items:stretch;justify-content:space-around;
}
#tabbar .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  color:#9AA7B4;font-size:10.5px;font-weight:600;letter-spacing:.01em;min-height:44px;transition:color .15s}
#tabbar .tab svg{width:23px;height:23px}
#tabbar .tab[aria-current="page"]{color:var(--primary)}
#tabbar .tab[aria-current="page"] .ic{background:var(--primary-soft)}
#tabbar .tab .ic{width:40px;height:30px;border-radius:999px;display:flex;align-items:center;justify-content:center;transition:background .15s}

/* content wrappers shared */
.wrap{width:100%;max-width:760px;margin:0 auto;padding:16px 18px calc(var(--tabh) + var(--sb) + 24px)}
.scr-head{display:flex;align-items:center;gap:12px;padding:14px 18px 6px}
.eyebrow{font-size:10.5px;font-weight:700;color:var(--primary);letter-spacing:.14em;text-transform:uppercase}
.h-title{font-size:19px;font-weight:700;color:var(--navy);letter-spacing:-.01em;margin-top:1px}

/* ════════════════ PRIMITIVES ════════════════ */
.pill{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:34px;padding:0 14px;border-radius:999px;
  border:1px solid var(--line);background:var(--white);color:var(--muted-2);font-size:12.5px;font-weight:600;white-space:nowrap;transition:all .15s}
.pill.xs{height:30px;padding:0 12px;font-size:12px}
.pill.active{background:var(--primary);border-color:var(--primary);color:#fff}
.pill.dark{background:var(--navy);border-color:var(--navy);color:#fff}
.pill:hover:not(.active):not(.dark){border-color:#cdd6df}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;letter-spacing:.03em;white-space:nowrap}
.badge.green{background:var(--green-tint);color:var(--green);border:1px solid var(--green-line)}
.badge.amber{background:var(--amber-tint);color:var(--amber);border:1px solid var(--amber-line)}
.badge.teal{background:var(--primary-soft);color:var(--primary);border:1px solid rgba(42,157,181,.25)}
.badge.gold{background:var(--gold-tint);color:var(--gold);border:1px solid #ECD9A6}
.sec-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--r-l);box-shadow:var(--sh-1)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;height:46px;padding:0 18px;border-radius:var(--r-s);
  font-size:14px;font-weight:700;transition:transform .12s,box-shadow .12s;min-height:44px}
.btn svg{width:17px;height:17px}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 10px 22px -10px rgba(42,157,181,.7)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-ghost{background:var(--white);border:1.5px solid var(--primary);color:var(--primary)}
.btn-ghost:hover{background:var(--primary-tint)}
.btn-soft{background:var(--bg);border:1px solid var(--line);color:var(--navy)}
.btn-soft:hover{background:var(--bg-2)}
.btn-full{width:100%}
.icon-btn{width:44px;height:44px;border-radius:12px;background:var(--white);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--navy);transition:transform .12s,background .15s}
.icon-btn:hover{background:var(--bg-2)}
.icon-btn svg{width:19px;height:19px}
.divider{height:1px;background:var(--line)}
.skel{height:10px;border-radius:6px;background:linear-gradient(90deg,#E5EBF1,#EEF2F6,#E5EBF1);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{to{background-position:-200% 0}}

/* status / live regions */
.status-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:6px 12px;border-radius:999px;transition:all .3s}

/* ════════════════ TABLET (768–1023) : top tab bar ════════════════ */
@media (min-width:768px){
  #tabbar{display:none}
  #appbar{
    display:flex;align-items:center;gap:18px;
    padding:14px 28px;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);position:sticky;top:0;z-index:40;min-height:68px;
  }
  #appbar .brand{display:flex;align-items:center;gap:11px}
  #appbar .brand .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 18px -10px rgba(42,157,181,.8)}
  #appbar .crumb{font-size:15px;font-weight:700;color:var(--navy);letter-spacing:-.01em}
  #appbar .crumb small{display:block;font-size:10px;font-weight:600;color:var(--primary);letter-spacing:.13em;text-transform:uppercase;margin-top:1px}
  #appbar .toptabs{display:flex;gap:4px;margin-left:6px}
  #appbar .toptabs a{display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:10px;font-size:13.5px;font-weight:600;color:var(--muted-2);transition:all .15s}
  #appbar .toptabs a svg{width:17px;height:17px}
  #appbar .toptabs a[aria-current="page"]{background:var(--primary-soft);color:var(--primary)}
  #appbar .toptabs a:hover:not([aria-current]){background:var(--bg)}
  #appbar .grow{flex:1}
  #appbar .ask{display:flex;align-items:center;gap:9px;height:42px;padding:0 8px 0 15px;background:var(--bg);border:1px solid var(--line);border-radius:12px;min-width:210px;max-width:320px;flex:1}
  #appbar .ask input{flex:1;background:none;border:none;outline:none;font-size:13.5px}
  #appbar .ask .go{width:30px;height:30px;border-radius:8px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  #appbar .trust{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--muted-2);padding:8px 10px;border-radius:9px;white-space:nowrap}
  #appbar .trust:hover{background:var(--bg);color:var(--navy)}
  .wrap{max-width:920px;padding:26px 28px 40px}
  .scr-head{padding:0 0 14px}
}

/* hide tablet toptabs once sidebar appears */
@media (min-width:1024px){
  #app{grid-template-columns:262px 1fr}
  #appbar .toptabs,#appbar .brand{display:none}
  #appbar{padding:16px 36px}
  #sidebar{
    display:flex;flex-direction:column;gap:6px;
    background:var(--white);border-right:1px solid var(--line);
    padding:22px 16px;position:sticky;top:0;height:100dvh;overflow-y:auto;
  }
  .wrap{max-width:1080px;padding:30px 36px 52px}
  .scr-head{padding:0 0 18px}
}
@media (min-width:1440px){ .wrap{max-width:1200px} }

/* ════════════════ SIDEBAR ════════════════ */
#sidebar .s-brand{display:flex;align-items:center;gap:12px;padding:4px 10px 18px}
#sidebar .s-brand .logo{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 22px -10px rgba(42,157,181,.85)}
#sidebar .s-brand b{font-size:16px;font-weight:700;color:var(--navy);letter-spacing:-.01em;display:block}
#sidebar .s-brand small{font-size:9.5px;font-weight:600;color:var(--primary);letter-spacing:.14em;text-transform:uppercase}
#sidebar .s-nav{display:flex;flex-direction:column;gap:3px}
#sidebar .s-nav a{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;font-size:14px;font-weight:600;color:var(--muted-2);transition:all .15s}
#sidebar .s-nav a svg{width:20px;height:20px;flex-shrink:0}
#sidebar .s-nav a[aria-current="page"]{background:var(--primary);color:#fff;box-shadow:0 10px 20px -12px rgba(42,157,181,.9)}
#sidebar .s-nav a:hover:not([aria-current]){background:var(--bg)}
#sidebar .s-sec{margin-top:18px;padding:0 13px 8px}
#sidebar .s-sec .lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
#sidebar .s-app{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:11px;transition:background .15s}
#sidebar .s-app:hover{background:var(--bg)}
#sidebar .s-app .dots{display:flex;gap:3px}
#sidebar .s-app .dots i{width:7px;height:7px;border-radius:50%;background:var(--line)}
#sidebar .s-app .dots i.on{background:var(--green)}
#sidebar .s-app .t{flex:1;min-width:0}
#sidebar .s-app .t b{font-size:13px;font-weight:700;color:var(--navy);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#sidebar .s-app .t small{font-size:11px;color:var(--muted)}
.sc-remove{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:7px 12px;border-radius:9px;font-size:12.5px;font-weight:700;color:var(--primary);background:var(--primary-soft);align-self:flex-start;transition:background .15s,color .15s}
.sc-remove svg{width:14px;height:14px}
.sc-remove:hover{background:var(--red-tint);color:var(--red)}
.saved-empty{display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;padding:54px 24px;background:var(--white);border:1px solid var(--line);border-radius:var(--r-l,20px);max-width:480px;margin:8px auto 0}
.saved-empty .ic{width:66px;height:66px;border-radius:50%;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center}
.saved-empty b{font-size:17px;color:var(--navy);font-weight:700}
.saved-empty p{font-size:13.5px;color:var(--muted-2);line-height:1.55;max-width:340px}
.saved-empty .btn{margin-top:4px}
#sidebar .s-foot{margin-top:auto;padding-top:16px;display:flex;flex-direction:column;gap:9px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-radius:11px;background:var(--bg);font-size:13px;font-weight:600;color:var(--navy)}
.switch{width:42px;height:24px;border-radius:999px;background:#CFD8E1;position:relative;transition:background .2s;flex-shrink:0}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .2s}
.switch[aria-pressed="true"]{background:var(--primary)}
.switch[aria-pressed="true"]::after{transform:translateX(18px)}
.lang-seg{display:flex;background:var(--bg);border-radius:11px;padding:3px;gap:3px}
.lang-seg button{flex:1;height:34px;border-radius:8px;font-size:12.5px;font-weight:700;color:var(--muted-2)}
.lang-seg button[aria-pressed="true"]{background:var(--white);color:var(--navy);box-shadow:var(--sh-1)}
.lang-top{display:inline-flex;align-items:center;gap:5px;height:32px;padding:0 9px 0 11px;margin-left:auto;border-radius:999px;border:1px solid var(--line);background:var(--bg);font-size:12px;font-weight:700;color:var(--navy);flex-shrink:0}
.lang-top svg{width:15px;height:15px;color:var(--primary)}
.lang-top .cv{width:12px;height:12px;color:var(--muted)}
.lang-top:hover{background:var(--bg-2)}
.lang-menu{position:fixed;z-index:120;width:248px;max-height:70vh;overflow-y:auto;background:var(--white);border:1px solid var(--line);border-radius:var(--r-m);box-shadow:var(--sh-3);padding:8px;animation:pop .16s ease}
.lang-menu .lm-head{font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:6px 10px 8px}
.lang-menu .lm-list{display:flex;flex-direction:column;gap:1px}
.lang-menu .lm-item{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:9px 10px;border-radius:9px;transition:background .12s}
.lang-menu .lm-item:hover:not(.soon){background:var(--bg)}
.lang-menu .lm-item[aria-checked="true"]{background:var(--primary-soft)}
.lang-menu .lm-native{font-size:14px;font-weight:700;color:var(--navy)}
.lang-menu .lm-en{font-size:12px;color:var(--muted);font-weight:500}
.lang-menu .lm-item[aria-checked="true"] .lm-en{color:var(--primary)}
.lang-menu .lm-check{margin-left:auto;width:20px;height:20px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lang-menu .lm-soon{margin-left:auto;font-size:9.5px;font-weight:700;color:var(--amber);background:var(--amber-tint);border:1px solid var(--amber-line);padding:3px 7px;border-radius:999px;letter-spacing:.02em;white-space:nowrap}
.lang-menu .lm-item.soon{cursor:default}
.lang-menu .lm-item.soon .lm-native{color:var(--muted-2)}
.lang-menu .lm-item.soon .lm-en{color:#A6B1BD}
.install-btn{display:flex;align-items:center;justify-content:center;gap:8px;height:42px;border-radius:11px;background:var(--navy);color:#fff;font-size:13px;font-weight:700}
.install-btn svg{width:16px;height:16px}

/* ════════════════ MIC / HOME ════════════════ */
.home{display:flex;flex-direction:column;align-items:center;min-height:100%;text-align:center}
.greet-card{display:flex;align-items:center;gap:13px;width:100%;max-width:520px;padding:13px 15px;margin-bottom:6px}
.greet-card .av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.greet-card .g{flex:1;text-align:left;line-height:1.25}
.greet-card .g small{font-size:12px;color:var(--muted);font-weight:500;display:block}
.greet-card .g b{font-size:15px;color:var(--navy);font-weight:700}
.mic-prompt{margin:26px 0 4px;max-width:440px}
.mic-prompt h2{font-size:26px;font-weight:700;color:var(--navy);letter-spacing:-.02em;line-height:1.18}
.mic-prompt p{font-size:14px;color:var(--muted);margin-top:8px;line-height:1.5}
.chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:18px;max-width:480px}
.mic-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;position:relative;width:100%;padding:30px 0 10px;min-height:300px}
.mic-rings{position:absolute;top:50%;left:50%;pointer-events:none}
.mic-rings i{position:absolute;top:50%;left:50%;border-radius:50%;border:1.6px solid var(--primary)}
.mic-btn{position:relative;z-index:3;width:152px;height:152px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 24px 48px -16px rgba(42,157,181,.6),inset 0 -3px 0 rgba(255,255,255,.15);transition:all .4s cubic-bezier(.34,1.56,.64,1)}
.mic-btn:hover{transform:translateY(-2px)}
.mic-btn svg{width:58px;height:58px}
.mic-btn.processing{background:#AEB9C4;box-shadow:0 14px 30px -16px rgba(130,144,160,.5)}
.mic-btn.answered{width:104px;height:104px}
.mic-btn.answered svg{width:42px;height:42px}
.mic-btn .recdot{position:absolute;top:12px;right:12px;width:17px;height:17px;border-radius:50%;background:var(--red);border:3px solid #fff;animation:blink 1.1s infinite}
.wave{display:flex;align-items:flex-end;gap:4px;height:34px}
.wave i{width:3.5px;border-radius:2px;background:var(--primary);transform-origin:bottom;animation:wavebar .85s infinite ease-in-out}
.mic-cap{line-height:1.3}
.mic-cap b{font-size:17px;font-weight:600;color:var(--muted-2)}
.mic-cap small{font-size:12.5px;color:#9AA7B4;display:block;margin-top:3px}
.stop-btn{display:none;align-items:center;justify-content:center;gap:8px;height:44px;padding:0 18px;border-radius:999px;background:var(--white);border:1.5px solid var(--red-line);color:var(--red);font-size:13px;font-weight:700}
.stop-btn svg{width:15px;height:15px}
body.vm-speaking .stop-btn{display:inline-flex;animation:fadeUp .2s ease}

/* response card */
.resp{width:100%;max-width:520px;text-align:left;animation:fadeUp .35s ease}
.resp .top{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:var(--primary);letter-spacing:.05em;text-transform:uppercase;margin-bottom:11px}
.resp .top .dot{width:7px;height:7px;border-radius:50%;background:var(--primary)}
.resp h3{font-size:20px;font-weight:700;color:var(--navy);letter-spacing:-.01em}
.resp .nh{font-size:13px;color:var(--muted);margin-top:2px}
.resp .pitch{font-size:14.5px;color:var(--text);margin-top:12px;line-height:1.55}
.resp .srcrow{display:flex;align-items:center;gap:8px;margin-top:14px;padding-top:13px;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted-2)}
.resp .srcrow .tick{width:18px;height:18px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.resp .srcrow .tick svg{width:10px;height:10px}
.why-link{display:inline-flex;align-items:center;gap:7px;margin-top:13px;font-size:13.5px;font-weight:600;color:var(--primary);text-decoration:underline;text-underline-offset:3px}
.why-link svg{width:15px;height:15px}
.fb-row{display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap}
.fb-btn{width:42px;height:42px;border-radius:11px;background:var(--bg);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted-2);transition:all .15s}
.fb-btn svg{width:18px;height:18px}
.fb-btn.up.on{background:var(--green-tint);border-color:var(--green-line);color:var(--green)}
.fb-btn.down.on{background:var(--red-tint);border-color:var(--red-line);color:var(--red)}

/* ════════════════ SCHEME CARDS ════════════════ */
.scheme-grid{display:grid;grid-template-columns:1fr;gap:14px}
@media (min-width:1024px){.scheme-grid{grid-template-columns:repeat(3,1fr);gap:18px;align-items:start}}
.sc-card{display:flex;flex-direction:column;padding:18px;position:relative;overflow:hidden}
.sc-card.best{border-color:rgba(201,154,46,.45);box-shadow:0 2px 6px rgba(20,30,50,.05),0 16px 34px -20px rgba(201,154,46,.4)}
.sc-card.applied{background:linear-gradient(180deg,#F2FAF3,#fff);border-color:var(--green-line)}
.sc-ribbon{display:inline-flex;align-items:center;gap:6px;align-self:flex-start;background:linear-gradient(135deg,#E0B43E,#C99A2E);color:#fff;font-size:11px;font-weight:700;padding:5px 11px;border-radius:8px;margin-bottom:12px;box-shadow:0 8px 16px -10px rgba(201,154,46,.8)}
.sc-card h3{font-size:18px;font-weight:700;color:var(--navy);letter-spacing:-.01em}
.sc-card .nh{font-size:12.5px;color:var(--muted);margin-top:2px}
.sc-card .benefit{font-size:14px;color:var(--text);margin-top:12px;font-weight:600}
.sc-card .benefit b{color:var(--primary)}
.sc-meta{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.sc-actions{display:flex;gap:8px;margin-top:16px}
.sc-actions .btn{flex:1;height:44px;font-size:13.5px;padding:0 10px}
.sc-progress{display:flex;align-items:center;gap:6px;margin-top:14px;padding-top:13px;border-top:1px dashed var(--green-line)}
.sc-progress .seg{flex:1;height:5px;border-radius:999px;background:var(--line)}
.sc-progress .seg.on{background:var(--green)}
.applied-tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:var(--green)}

/* ════════════════ SCHEME DETAIL ════════════════ */
.detail-grid{display:grid;grid-template-columns:1fr;gap:22px}
@media (min-width:1024px){.detail-grid{grid-template-columns:minmax(0,1fr) 340px;gap:32px;align-items:start}}
.detail-main{display:flex;flex-direction:column;gap:22px;min-width:0}
.d-hero h1{font-size:25px;font-weight:700;color:var(--navy);letter-spacing:-.015em;margin-top:11px;line-height:1.15}
.d-hero .nh{font-size:14px;color:var(--muted);margin-top:4px}
.d-hero .pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px}
.stat-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat-strip .s{padding:14px 10px;background:var(--white);border:1px solid var(--line);border-radius:var(--r-m);text-align:center}
.stat-strip .s b{font-size:21px;font-weight:700;color:var(--navy);display:block;letter-spacing:-.01em}
.stat-strip .s small{font-size:11px;color:var(--muted);margin-top:3px;display:block}
.sec h2{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:12px}
.prose p{font-size:14.5px;color:var(--muted-2);line-height:1.6;margin-bottom:10px}
.prose p .hi{color:var(--text)}
.bene{display:flex;flex-direction:column;gap:12px}
.bene li{display:flex;gap:11px;align-items:flex-start}
.bene .ic{width:26px;height:26px;border-radius:8px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.bene .ic svg{width:14px;height:14px}
.bene b{font-size:14px;color:var(--navy);font-weight:700;display:block}
.bene small{font-size:13px;color:var(--muted-2);display:block;margin-top:2px;line-height:1.5}
.elig{display:flex;flex-direction:column;gap:11px}
.elig li{display:flex;gap:11px;align-items:flex-start;font-size:14px;color:var(--text)}
.elig .mk{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.elig .mk svg{width:12px;height:12px}
.elig .mk.yes{background:var(--green);color:#fff}
.elig .mk.no{background:var(--red);color:#fff}
.elig .mk.unk{background:#E2E8EF;color:var(--muted-2)}
.elig li .rk{font-size:11px;color:var(--muted);display:block;margin-top:1px}
.docs{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
@media (min-width:560px){.docs{grid-template-columns:repeat(3,1fr)}}
.docs .doc{display:flex;align-items:center;gap:8px;padding:11px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r-s);font-size:12.5px;color:var(--navy);font-weight:600}
.docs .doc svg{width:16px;height:16px;color:var(--primary);flex-shrink:0}
.links{display:flex;flex-direction:column;gap:9px}
.link-row{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--white);border:1px solid var(--line);border-radius:var(--r-m)}
.link-row .ic{width:38px;height:38px;border-radius:10px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.link-row .ic svg{width:18px;height:18px}
.link-row .t{flex:1;min-width:0}
.link-row .t b{font-size:13.5px;font-weight:700;color:var(--navy);display:block}
.link-row .t small{font-size:12px;color:var(--muted);display:block;margin-top:1px}
.link-row .chev{color:var(--muted)}
.helpline{background:linear-gradient(135deg,#F4FAFB,#fff);border-color:rgba(42,157,181,.3)}
.call-btn{display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 16px;border-radius:10px;background:var(--green);color:#fff;font-size:13px;font-weight:700;flex-shrink:0}
.call-btn svg{width:15px;height:15px}

/* apply card (desktop sticky) */
.apply-card{display:flex;flex-direction:column;gap:11px;padding:20px}
@media (min-width:1024px){.apply-card{position:sticky;top:90px}}
.apply-card .conf{display:flex;align-items:center;gap:8px;padding:11px 13px;background:var(--green-tint);border:1px solid var(--green-line);border-radius:var(--r-m);font-size:13px;font-weight:600;color:var(--green)}
.apply-card .conf svg{width:18px;height:18px;flex-shrink:0}
.apply-card .row{display:flex;gap:9px}
.apply-card .row .btn{flex:1}
/* mobile sticky bottom apply bar */
.apply-bar{position:fixed;left:0;right:0;bottom:0;z-index:55;padding:12px 16px calc(12px + var(--sb));background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);box-shadow:0 -8px 24px -14px rgba(20,30,50,.18)}
.apply-bar .row{display:flex;gap:9px}
.apply-bar .ico{width:46px;flex-shrink:0;padding:0}
@media (min-width:1024px){.apply-bar{display:none}}

/* ════════════════ APPLY STEPS ════════════════ */
.prog-head{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--muted-2);margin-bottom:9px}
.prog-head b{color:var(--navy)}
.prog-head .pct{color:var(--primary);font-weight:700}
.prog-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.prog-bar .seg{height:7px;border-radius:999px;background:var(--line);transition:background .4s}
.prog-bar .seg.on{background:var(--primary)}
.doc-tray{margin:16px 0;border:1px solid var(--line);border-radius:var(--r-m);overflow:hidden;background:var(--white)}
.doc-tray .tray-head{display:flex;align-items:center;gap:11px;padding:14px;width:100%;text-align:left}
.doc-tray .tray-head .ic{width:36px;height:36px;border-radius:9px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-tray .tray-head .t{flex:1}
.doc-tray .tray-head .t b{font-size:14px;color:var(--navy);font-weight:700;display:block}
.doc-tray .tray-head .t small{font-size:12px;color:var(--muted)}
.doc-tray .tray-head .chev{transition:transform .25s}
.doc-tray.open .tray-head .chev{transform:rotate(180deg)}
.doc-tray .tray-body{display:none;padding:0 14px 14px;flex-direction:column;gap:8px}
.doc-tray.open .tray-body{display:flex;animation:fadeUp .2s ease}
.doc-tray .dl{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:9px;font-size:13px;font-weight:600;color:var(--navy)}
.doc-tray .dl .mk{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-tray .dl .mk svg{width:11px;height:11px}
.doc-tray .dl .mk.ready{background:var(--green);color:#fff}
.doc-tray .dl .mk.miss{background:var(--amber-tint);color:var(--amber);border:1px solid var(--amber-line)}
.doc-tray .dl .st{margin-left:auto;font-size:11px;font-weight:700}
.doc-tray .dl .st.ready{color:var(--green)}
.doc-tray .dl .st.miss{color:var(--amber)}
.steps{position:relative;display:flex;flex-direction:column;gap:13px;padding-left:2px}
.steps::before{content:"";position:absolute;left:20px;top:20px;bottom:24px;width:2px;background:var(--line)}
.step{display:flex;gap:14px;align-items:flex-start;position:relative;z-index:1}
.step .node{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;background:#AEB9C4;box-shadow:0 0 0 4px var(--bg)}
.step .node svg{width:16px;height:16px}
.step.done .node{background:var(--green)}
.step.current .node{background:var(--primary);box-shadow:0 0 0 4px var(--bg),0 8px 18px -8px rgba(42,157,181,.8)}
.step .body{flex:1;padding:13px 16px;border-radius:var(--r-m);background:var(--white);border:1px solid var(--line);min-width:0}
.step.current .body{background:var(--primary-tint);border-color:rgba(42,157,181,.28);border-left:3px solid var(--primary)}
.step.done .body{background:#FAFCFB}
.step.locked .body{opacity:.78}
.step .body .top{display:flex;align-items:center;gap:9px}
.step .body .top .ti{flex:1;font-size:14.5px;font-weight:700;color:var(--navy);line-height:1.3}
.step.done .body .top .ti{color:var(--muted-2);font-weight:500}
.step .body .desc{font-size:13px;color:var(--muted-2);margin-top:7px;line-height:1.55}
.step .revisit{font-size:11.5px;color:var(--primary);font-weight:600;margin-top:6px;display:inline-flex;align-items:center;gap:5px}
.step .help-row{display:flex;gap:9px;margin-top:13px;padding-top:13px;border-top:1px dashed rgba(42,157,181,.3)}
.step .help-row .btn{flex:1;height:42px;font-size:13px}
.lockico{width:15px;height:15px;color:var(--muted)}
/* success */
.success{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;min-height:60vh;animation:pop .4s ease}
.success .ring{width:96px;height:96px;border-radius:50%;background:var(--green-tint);border:2px solid var(--green-line);display:flex;align-items:center;justify-content:center;margin-bottom:22px}
.success .ring svg{width:46px;height:46px;color:var(--green)}
.success h2{font-size:25px;font-weight:700;color:var(--navy);letter-spacing:-.01em}
.success p{font-size:14.5px;color:var(--muted-2);margin-top:9px;max-width:380px;line-height:1.55}
.refnum{margin-top:20px;padding:14px 22px;background:var(--white);border:1px dashed var(--primary);border-radius:var(--r-m);font-size:20px;font-weight:700;color:var(--primary);letter-spacing:.05em}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:90;overflow:hidden}
.confetti i{position:absolute;top:-20px;width:9px;height:14px;border-radius:2px;animation:confettiFall linear forwards}

/* ════════════════ HISTORY ════════════════ */
.hist-grid{display:grid;grid-template-columns:1fr;gap:0}
@media (min-width:1024px){.hist-grid{grid-template-columns:minmax(0,420px) 1fr;gap:28px;align-items:start}}
.hist-list{display:flex;flex-direction:column;gap:14px}
.hist-group .glabel{display:flex;align-items:center;gap:10px;margin:6px 0 10px}
.hist-group .glabel span{font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:.1em}
.hist-group .glabel .ln{flex:1;height:1px;background:var(--line)}
.hist-item{padding:14px;border-radius:var(--r-m);text-align:left;width:100%;display:block;transition:border-color .15s,box-shadow .15s}
.hist-item:hover{box-shadow:var(--sh-2)}
.hist-item.sel{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary)}
.hist-item .qrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.hist-item .qrow small{font-size:11px;color:var(--muted)}
.hist-item .q{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.hist-item .q .ic{width:24px;height:24px;border-radius:7px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hist-item .q .ic svg{width:12px;height:12px}
.hist-item .q b{font-size:13.5px;font-weight:600;color:var(--navy);text-align:left}
.hist-item .ans{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r-s)}
.hist-item .ans .ic{width:30px;height:30px;border-radius:8px;background:#E0E7EE;color:var(--muted-2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hist-item .ans .ic svg{width:14px;height:14px}
.hist-item .ans .t{flex:1;min-width:0}
.hist-item .ans .t b{font-size:12.5px;font-weight:700;color:var(--navy);display:block}
.hist-item .ans .t small{font-size:11px;color:var(--muted)}
.hist-detail{display:none}
@media (min-width:1024px){.hist-detail{display:block;position:sticky;top:90px}}
.empty{display:flex;flex-direction:column;align-items:center;text-align:center;padding:60px 24px}
.empty .ic{width:72px;height:72px;border-radius:50%;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.empty .ic svg{width:34px;height:34px}
.empty h2{font-size:20px;font-weight:700;color:var(--navy)}
.empty p{font-size:14px;color:var(--muted-2);margin-top:8px;max-width:320px;line-height:1.5}

/* ════════════════ CHAT ════════════════ */
.chat{display:flex;flex-direction:column;height:calc(100dvh - var(--tabh) - var(--sb));max-width:760px;margin:0 auto}
@media (min-width:768px){.chat{height:calc(100dvh - 68px)}}
@media (min-width:1024px){.chat{height:calc(100dvh - 70px);max-width:860px}}
.chat-head{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line);background:var(--white);flex-shrink:0}
.chat-head .av{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-head .av svg{width:20px;height:20px}
.chat-head .t{flex:1}
.chat-head .t b{font-size:15.5px;font-weight:700;color:var(--navy)}
.chat-head .t small{font-size:11.5px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:5px;margin-top:2px}
.chat-head .t small .d{width:6px;height:6px;border-radius:50%;background:var(--green)}
.chat-body{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:14px}
.daysep{text-align:center;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.msg{display:flex;align-items:flex-end;gap:9px;max-width:84%}
.msg .av{width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-weight:700}
.msg .av svg{width:15px;height:15px}
.msg .bub{padding:11px 14px;font-size:14px;line-height:1.5;border-radius:16px 16px 16px 5px;background:var(--white);border:1px solid var(--line);color:var(--text)}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.user .av{background:linear-gradient(135deg,var(--navy),#2E3A4B)}
.msg.user .bub{background:var(--primary);color:#fff;border-color:transparent;border-radius:16px 16px 5px 16px}
.msg .why-link{margin-top:0;font-size:12px}
.msg-meta{font-size:10px;color:var(--muted);margin-top:4px}
.typing{display:flex;gap:4px;padding:13px 16px}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:dotPulse 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
.quick{display:flex;gap:7px;padding:6px 16px;flex-wrap:wrap;flex-shrink:0}
.chat-input{padding:10px 16px calc(10px + var(--sb));background:var(--white);border-top:1px solid var(--line);flex-shrink:0}
.chat-input .bar{display:flex;align-items:center;gap:8px;padding:6px 8px 6px 15px;border:1.5px solid var(--line);border-radius:16px;background:var(--bg);transition:border-color .2s}
.chat-input .bar:focus-within{border-color:var(--primary)}
.chat-input input{flex:1;border:none;background:none;outline:none;font-size:14px}
.chat-input .vb{width:38px;height:38px;border-radius:11px;background:var(--white);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--navy);flex-shrink:0}
.chat-input .vb svg{width:16px;height:16px}
.chat-input .send{width:38px;height:38px;border-radius:11px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 6px 14px -6px rgba(232,115,90,.7)}
.chat-input .send svg{width:16px;height:16px}

/* ════════════════ MENU DRAWER (mobile / tablet) ════════════════
   Top-left hamburger button + slide-in drawer that holds the full nav.
   Replaces the bottom tab bar on mobile / tablet — sidebar stays on
   desktop. The button is rendered inside #frame so the viewport
   simulator (which positions #app as a 430px card) shows it on the
   frame edge, not the window edge. */
.menu-fab{
  position:absolute; top:10px; left:10px; z-index:75;
  width:42px; height:42px; border-radius:12px;
  background:rgba(255,255,255,.96); border:1px solid var(--line);
  color:var(--navy); display:flex; align-items:center; justify-content:center;
  box-shadow:var(--sh-2); backdrop-filter:blur(8px); cursor:pointer;
  transition:transform .12s, background .15s;
}
.menu-fab:hover{transform:translateY(-1px); background:#fff}
.menu-fab svg{width:20px; height:20px}
/* Hide on desktop — sidebar already shows the same nav. */
@media (min-width:1024px){ .menu-fab{display:none} }
body[data-viewport="desktop"] .menu-fab{display:none !important}
body[data-viewport="mobile"] .menu-fab,
body[data-viewport="tablet"] .menu-fab{display:flex !important}

/* Drawer lives inside #app. position:absolute clips to that — so in
   viewport-sim modes the drawer stays inside the mobile/tablet card,
   and on real mobile #app fills the viewport so it still covers the
   whole screen. */
.menu-drawer{position:absolute; inset:0; z-index:200; display:none}
.menu-drawer.open{display:block}
.menu-scrim{position:absolute; inset:0; background:rgba(20,30,50,.45); animation:fadeIn .18s ease}
.menu-panel{
  position:absolute; top:0; bottom:0; left:0;
  width:min(86%, 320px);
  background:#fff; box-shadow:0 24px 60px -16px rgba(20,30,50,.4);
  display:flex; flex-direction:column;
  animation:slideInLeft .22s ease;
  overflow-y:auto;
}
/* #app must be a positioning context so the drawer's inset:0 clips to it. */
#app{position:relative}
@keyframes slideInLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.menu-head{display:flex; align-items:center; gap:11px; padding:18px 18px 14px; border-bottom:1px solid var(--line)}
.menu-head .logo{width:38px; height:38px; border-radius:11px; background:linear-gradient(135deg,var(--primary),var(--primary-d)); color:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 18px -10px rgba(42,157,181,.85); flex-shrink:0}
.menu-head .brand{flex:1; min-width:0}
.menu-head .brand b{font-size:15.5px; font-weight:700; color:var(--navy); letter-spacing:-.01em; display:block}

   the floating button so the screen has a clear top edge. Only shows in
   mobile mode (real ≤767px or viewport-sim mobile). */
.m-topbar{display:none; align-items:center; gap:10px; padding:12px 14px 10px; background:rgba(255,255,255,.96); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:50; min-height:54px}

.m-topbar .m-burger:hover,
.m-topbar .m-back:hover{background:var(--bg)}
.m-topbar .m-burger svg,
.m-topbar .m-back svg{width:22px; height:22px}
.m-topbar .m-title{flex:1; min-width:0}

.m-topbar .m-title small{display:block; font-size:10.5px; font-weight:600; color:var(--primary); letter-spacing:.13em; text-transform:uppercase; margin-top:1px}
.m-topbar .m-logo{width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,var(--primary),var(--primary-d)); color:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 18px -10px rgba(42,157,181,.7); flex-shrink:0}
.m-topbar .m-logo svg{width:18px; height:18px}

/* Floating hamburger fallback hidden once the inline topbar exists. */

/* ════════════════ VIEWPORT SIMULATOR ════════════════
   Floating top-right toggle that forces a layout (mobile/tablet/desktop)
   regardless of real window width. Useful for demoing the responsive
   design from a single laptop window. */
/* Sits in the bottom-right corner so it doesn't collide with the appbar
   "Trust metrics" link on tablet/desktop, or the mobile status bar at the
   top. On mobile it floats above the bottom tab bar. */
.vp-fab{position:fixed;bottom:calc(var(--tabh) + var(--sb) + 14px);right:14px;z-index:120;display:flex;align-items:center;gap:6px;height:36px;padding:0 12px;border-radius:999px;background:rgba(27,42,65,.92);color:#fff;font-size:12.5px;font-weight:700;letter-spacing:.01em;box-shadow:0 8px 22px -8px rgba(20,30,50,.45);backdrop-filter:blur(6px);transition:transform .12s,background .15s}
.vp-fab:hover{transform:translateY(-1px);background:var(--navy)}
.vp-fab svg{width:15px;height:15px}
.vp-menu{position:fixed;bottom:calc(var(--tabh) + var(--sb) + 58px);right:14px;z-index:121;width:200px;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh-3);padding:6px;display:none;animation:fadeUp .15s ease}
.vp-menu.open{display:block}
@media (min-width:768px){
  /* No mobile tab bar to clear — sit a comfortable distance from the corner. */
  .vp-fab{bottom:20px;right:24px}
  .vp-menu{bottom:64px;right:24px}
}
.vp-menu button{display:flex;align-items:center;gap:10px;width:100%;padding:10px 11px;border-radius:9px;font-size:13px;font-weight:600;color:var(--text);transition:background .12s,color .12s;text-align:left}
.vp-menu button:hover{background:var(--bg)}
.vp-menu button[aria-pressed="true"]{background:var(--primary-soft);color:var(--primary)}
.vp-menu button svg{width:18px;height:18px;flex-shrink:0}
.vp-menu button small{display:block;font-size:10.5px;color:var(--muted);font-weight:600;letter-spacing:.05em;margin-top:1px}
.vp-menu button .lbl{flex:1;min-width:0;line-height:1.2}
/* Forced layouts — override the natural media queries. The MENU DRAWER
   block earlier owns: tabbar hidden, hamburger visible, .wrap padding,
   tablet appbar trim. Those rules MUST win — don't redeclare them here. */
body[data-viewport="mobile"] #app{grid-template-columns:1fr!important;max-width:430px;margin:5dvh auto 0;box-shadow:0 24px 60px -16px rgba(20,30,50,.25);border-radius:24px;overflow:hidden;min-height:auto;height:90dvh;position:relative}

body[data-viewport="mobile"] #appbar{display:none!important}

body[data-viewport="mobile"] #view{overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
/* Force single-column layouts regardless of actual window width — the real
   @media (min-width:1024px) rules can't be overridden any other way. */

/* ─────────── VM_API (live + fallback) ─────────── */
async function apiFetch(path, opts){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), 6000);
  try{
    const r = await fetch(API_BASE+path, Object.assign({signal:ctrl.signal, headers:{'Content-Type':'application/json'}}, opts));
    clearTimeout(t);
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  }catch(e){ clearTimeout(t); throw e; }
}

/* ─────────── MIC CAPTURE (getUserMedia + MediaRecorder) ───────────
   Replaces the timer-only "fake recording" — gives runAskFlow / sendChat
   a real audio Blob to POST to /voice. 30s hard cap. */
const Mic = {
  stream:null, recorder:null, chunks:[], _timer:null,
  _audioCtx:null, _analyser:null, _vadInterval:null, _vadFired:false,
  onSilenceEnd:null,                      // caller sets this to be notified
  async start(){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      throw new Error('Mic API not supported');
    }
    this.stream = await navigator.mediaDevices.getUserMedia({
      audio:{sampleRate:16000, channelCount:1, echoCancellation:true},
    });
    this.chunks = [];
    const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/webm';
    this.recorder = new MediaRecorder(this.stream, {mimeType:mime});
    this.recorder.ondataavailable = (e)=>{ if(e.data && e.data.size) this.chunks.push(e.data); };
    this.recorder.start();
    this._timer = setTimeout(()=>this.stop(), 30000);
    this._setupVAD();
  },
  // Voice activity detection: sample mic level every 200ms via Web Audio
  // AnalyserNode. Once the user has clearly started speaking (RMS crosses
  // the threshold at least once), 5s of silence triggers onSilenceEnd().
  _setupVAD(){
    try{
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC || !this.stream) return;
      this._audioCtx = new AC();
      const src = this._audioCtx.createMediaStreamSource(this.stream);
      this._analyser = this._audioCtx.createAnalyser();
      this._analyser.fftSize = 1024;
      src.connect(this._analyser);
      const buf = new Float32Array(this._analyser.fftSize);
      const THRESHOLD = 0.012;    // RMS — above this = "voice"
      const SILENCE_MS = 5000;    // 5s of silence after voice = auto-stop
      let lastSpeechAt = Date.now();
      let voiceStarted = false;
      this._vadFired = false;
      this._vadInterval = setInterval(()=>{
        if(!this._analyser) return;
        this._analyser.getFloatTimeDomainData(buf);
        let sum = 0;
        for(let i=0;i<buf.length;i++) sum += buf[i]*buf[i];
        const rms = Math.sqrt(sum/buf.length);
        if(rms > THRESHOLD){
          lastSpeechAt = Date.now();
          voiceStarted = true;
        } else if(voiceStarted && (Date.now() - lastSpeechAt) > SILENCE_MS){
          if(!this._vadFired){
            this._vadFired = true;
            if(typeof this.onSilenceEnd === 'function'){ try{ this.onSilenceEnd(); }catch(e){} }
          }
        }
      }, 200);
    }catch(e){ /* VAD unsupported - 30s timer still kicks in */ }
  },
  _teardownVAD(){
    if(this._vadInterval){ clearInterval(this._vadInterval); this._vadInterval = null; }
    if(this._audioCtx){ try{ this._audioCtx.close(); }catch(e){} this._audioCtx = null; }
    this._analyser = null;
    this._vadFired = false;
  },
  async stop(){
    clearTimeout(this._timer);
    this._teardownVAD();
    return new Promise((resolve)=>{
      if(!this.recorder || this.recorder.state === 'inactive'){
        return resolve(new Blob([], {type:'audio/webm'}));
      }
      this.recorder.onstop = ()=>{
        try{ this.stream.getTracks().forEach(t=>t.stop()); }catch(e){}
        resolve(new Blob(this.chunks, {type:this.recorder.mimeType}));
      };
      try{ this.recorder.stop(); }catch(e){ resolve(new Blob([], {type:'audio/webm'})); }
    });
  },
};
window.Mic = Mic;

/* ─────────── AUDIO MANAGER ─────────── */
let curAudio=null, reqAudioId=0;
function setSpeaking(on){ document.body.classList.toggle('vm-speaking', !!on); }
function stopAudio(){
  reqAudioId++;
  if(curAudio){ try{ curAudio.pause(); curAudio.src=''; }catch(e){} curAudio=null; }
  if(window.speechSynthesis){ try{ speechSynthesis.cancel(); }catch(e){} }
  setSpeaking(false);
}
function speak(text, audioPath){
  stopAudio();
  if(lowData && !speak._forced){ /* low-data: require explicit tap handled by caller */ }
  const myId = ++reqAudioId;
  const src = audioSrc(audioPath);
  const useSynth = ()=>{
    if(myId!==reqAudioId) return;
    if(!window.speechSynthesis || !text){ setSpeaking(false); return; }
    const u=new SpeechSynthesisUtterance(text);
    u.lang='hi-IN'; u.rate=0.95;
    u.onend=()=>{ if(myId===reqAudioId) setSpeaking(false); };
    u.onerror=()=>{ if(myId===reqAudioId) setSpeaking(false); };
    setSpeaking(true); speechSynthesis.speak(u);
  };
  if(src){
    const a=new Audio(src); curAudio=a;
    a.addEventListener('playing',()=>{ if(myId===reqAudioId) setSpeaking(true); });
    a.addEventListener('ended',()=>{ if(myId===reqAudioId) setSpeaking(false); });
    a.addEventListener('pause',()=>{ if(myId===reqAudioId && a.ended) setSpeaking(false); });
    a.addEventListener('error',()=>{ curAudio=null; useSynth(); });
    setSpeaking(true);
    a.play().catch(()=>{ curAudio=null; useSynth(); });
  } else { useSynth(); }
}

/* Re-render the slide-in drawer's nav + low-data toggle. The "Applied"
   item in the nav owns its own screen so we don't list applications

function renderDrawer(sec){

  if(nav){
    nav.innerHTML = NAV.map(n=>`<a href="${n.hash}" ${n.id===sec?'aria-current="page"':''}>${svg(n.icon,20)}<span>${n.label}</span><span class="hi">${n.hi}</span></a>`).join('');
  }

  if(ld){ ld.setAttribute('aria-pressed', String(lowData)); }

/* Open/close the slide-in drawer. Open on hamburger click; close on
   scrim click, item click, Esc, or hash change. */
(function wireDrawer(){
  const drawer = document.getElementById('menu-drawer');
  const fab = document.getElementById('menu-fab');
  if(!drawer || !fab) return;
  function open(){
    drawer.classList.add('open');
    drawer.setAttribute('aria-hidden','false');
  }
  function close(){
    drawer.classList.remove('open');
    drawer.setAttribute('aria-hidden','true');
  }
  fab.addEventListener('click', open);
  drawer.addEventListener('click', (e)=>{
    if(e.target.closest('[data-menu-close]')) close();
    // Any nav link tap inside the drawer should also dismiss it.
    if(e.target.closest('.menu-nav a, .menu-applied a')) close();
  });
  document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') close(); });
  // Close on route change (clicking a nav link triggers hashchange).
  window.addEventListener('hashchange', close);
  // Wire the in-drawer toggles + install button. They re-bind every time
  // renderDrawer runs (innerHTML rewrite would lose listeners), so we use
  // delegated handlers here.
  drawer.addEventListener('click', (e)=>{
    const ld = e.target.closest('#menu-lowdata');
    if(ld){
      lowData = !lowData; store.set('low_data', lowData);
      ld.setAttribute('aria-pressed', String(lowData));
      const sbSwitch = document.getElementById('sw-lowdata');
      if(sbSwitch) sbSwitch.setAttribute('aria-pressed', String(lowData));
      toast(lowData ? 'Low-data on · kam data' : 'Low-data off');
      e.stopPropagation();
    }
  });
})();

let pendingQuery=null;
const HOME={state:'idle', resp:null, vote:null};
let micRecording=false;        // are we currently capturing audio?
let micQueryIsText=true;       // chip/text path vs. real voice path
function startAsk(text){ stopAudio(); pendingQuery=text||pendingQuery; micQueryIsText=true; HOME.state='recording'; paintHome(); runAskFlow(); }
let homeTimers=[];
function clearHomeTimers(){ homeTimers.forEach(clearTimeout); homeTimers=[]; }
// Begin real mic capture. The mic-button click handler advances 'recording'
// → 'processing' which awaits Mic.stop() and posts the blob.
async function beginMicRecording(){
  stopAudio();                            // kill any previous response audio
  micQueryIsText=false;
  try{
    // VAD callback: 5s of silence after the user started speaking →
    // auto-advance to processing and POST the blob. Same effect as the
    // user tapping the mic again to stop.
    Mic.onSilenceEnd = ()=>{
      if(!micRecording) return;
      micRecording = false;
      clearHomeTimers();
      HOME.state = 'processing'; paintHome();
      runAskFlow();
    };
    await Mic.start();
    micRecording=true;
    HOME.state='recording'; paintHome();
    // 30s hard cap (in addition to VAD): if user is still speaking, stop.
    homeTimers.push(setTimeout(()=>{
      if(micRecording){ micRecording=false; HOME.state='processing'; paintHome(); runAskFlow(); }
    }, 30000));
  }catch(e){
    console.warn('Mic start failed', e);
    toast('Mic permission chahiye · settings mein allow kariye', I.warn);
    HOME.state='idle'; paintHome();
  }
}
async function runAskFlow(){
  clearHomeTimers();
  // For text/chip queries we keep the original 1.9s "scanning" beat so the
  // UI doesn't feel jumpy. For real voice we go straight to processing
  // because the user just stopped recording.
  if(micQueryIsText){
    homeTimers.push(setTimeout(()=>{ HOME.state='processing'; paintHome(); }, 1900));
  }
  let resp;
  try{
    if(!micQueryIsText){
      // Real voice path: stop mic, POST the blob to /voice.
      const blob = await Mic.stop();
      micRecording=false;
      resp = await VM_API.voice(blob, lowData?'low':'high');
    } else {
      resp = await VM_API.chat(pendingQuery||'Sarkari yojana batao');
    }
  }
  catch(e){ resp = mockChat(pendingQuery||''); }
  HOME.resp=resp; HOME.vote=null; lastResponse=resp; store.set('last_response',resp);
  // log message to local history
  const msgs=store.get('messages',SAMPLE_MESSAGES.slice());
  const sid=(resp.top_3_schemes&&resp.top_3_schemes[0])?resp.top_3_schemes[0].scheme_id:'pmjdy';
  msgs.unshift({id:resp.message_id,role:'user',modality:lowData?'voice':'text',content_text:resp.transcript_hi,retrieved_schemes:(resp.top_3_schemes||[]).map(s=>s.scheme_id),created_at:Date.now(),status:'Searched',scheme_id:sid});
  store.set('messages',msgs);
  // For voice path the user is already waiting — go straight to 'answered'
  // and play. For text/chip we keep a tiny 600ms beat so the "processing"
  // copy doesn't flash. (The 3s wait was killing autoplay on real voice.)
  const delay = micQueryIsText ? 600 : 0;
  homeTimers.push(setTimeout(()=>{
    HOME.state='answered'; paintHome();
    if(!lowData) speak(resp.response_text_hi, resp.response_audio_url);
  }, delay));
}

  if(st==='recording'){ const r=host.querySelector('#rings'); [300,250,200].forEach((sz,i)=>{ const c=el(`<i style="width:${sz}px;height:${sz}px;margin:${-sz/2}px 0 0 ${-sz/2}px;--o:${[.12,.2,.32][i]};animation:ringPulse 2.2s infinite ${i*.35}s"></i>`); r.appendChild(c); }); }
  // wire
  host.querySelectorAll('#home-chips .pill').forEach(b=>b.addEventListener('click',()=>{ stopAudio(); pendingQuery=b.dataset.q; micQueryIsText=true; HOME.state='recording'; paintHome(); runAskFlow(); }));
  const mic=host.querySelector('#mic');
  mic.addEventListener('click',()=>{
    if(HOME.state==='idle'){
      // First tap on mic = start REAL recording. Chip taps go through
      // startAsk() (text path) which also lands here in 'recording'.
      pendingQuery=null;
      beginMicRecording();
    }
    else if(HOME.state==='recording'){
      // Second tap = user is done speaking. Stop the mic and POST.
      clearHomeTimers();
      HOME.state='processing'; paintHome();
      if(micRecording){ runAskFlow(); }
    }
    else if(HOME.state==='answered'){
      stopAudio(); HOME.state='idle'; HOME.resp=null; pendingQuery=null; paintHome();
    }
  });
  const sa=host.querySelector('#stop-audio'); if(sa) sa.addEventListener('click',stopAudio);
  wireResponseCard(host);
}

async function screenSchemes(){

  // doesn't match the corpus (refusal). Falling through to top3() so the
  // Schemes tab still has cards to show — better than a blank screen.

    ? lastResponse.top_3_schemes : [];

  const noMatch = !live.length;
  v.innerHTML='';

function schemeCard(sm,best){
  const s=SCHEMES[sm.scheme_id]||{}; const applied=isApplied(sm.scheme_id);
  const effort=(s.stats&&s.stats[2])?s.stats[2][0]:'Aasaan';
  // Lang-aware ordering: in Hindi mode the Devanagari name is the title
  // and English is the subtitle. In English mode the opposite. This is
  // why Hindi users were complaining their scheme cards read in English.
  const hiMode = (typeof lang !== 'undefined') && lang === 'HI';
  const primaryName = hiMode ? sm.name_hi : sm.name_en;
  const secondaryName = hiMode ? sm.name_en : sm.name_hi;
  const c=el(`<article class="sc-card card ${best?'best':''} ${applied?'applied':''}">
    ${best?`<span class="sc-ribbon">${svg(I.bolt,13)} ${hiMode?'आपके लिए सबसे अच्छा':'Aapke liye sabse achha'}</span>`:''}
    ${applied?`<span class="applied-tag" style="margin-bottom:10px">${svg(I.check,13,3)} ${hiMode?'अर्ज़ी शुरू की':'Arzi shuru ki'}</span>`:''}

    <div class="nh ${hiMode?'':'hi'}">${esc(secondaryName)}</div>
    <div class="benefit hi">${esc(sm.one_line_pitch_hi||'')}</div>
    <div class="sc-meta">
      <span class="badge ${effort.match(/aasaan|easy/i)?'green':'amber'}">${esc(effort)} apply</span>
      <span class="badge teal">${Math.round((sm.match_confidence||.8)*100)}% match</span>
    </div>
    <div class="sc-actions">
      <button class="btn btn-soft" data-listen>${svg(I.speaker,16)} सुन लो</button>
      <button class="btn btn-primary" data-go>आगे बढ़ो ${svg(I.arrow,15)}</button>
    </div>
    ${applied?appliedStrip(sm.scheme_id):''}
  </article>`);
  c.querySelector('[data-go]').addEventListener('click',()=> location.hash='#/scheme/'+sm.scheme_id);
  let myReq;
  c.querySelector('[data-listen]').addEventListener('click',async()=>{
    myReq=++listenReq; const ex=await VM_API.explain(sm.scheme_id,'short');
    if(myReq!==listenReq) return; // stale tap discarded
    speak(ex.explanation_text_hi, ex.explanation_audio_url);
    toast('Sun rahe ho… · Playing', I.speaker);
  });
  return c;
}
let listenReq=0;
function appliedStrip(id){
  const st=store.get(progressKey(id),null); const total=st?st.length:5; const done=st?st.filter(x=>x==='done').length:0;
  return `<div class="sc-progress">${Array.from({length:3},(_,i)=>`<div class="seg ${i< Math.ceil(done/total*3)?'on':''}"></div>`).join('')}<span style="font-size:11px;color:var(--green);font-weight:700;white-space:nowrap">${done}/${total}</span></div>`;
}

async function screenApply(id){
  const v=document.getElementById('view');
  v.innerHTML=`<section class="wrap"><div class="skel" style="width:40%;height:20px;margin:20px 0"></div></section>`;
  const s=SCHEMES[id]||await VM_API.scheme(id);
  if(!isApplied(id)){ markApplied(id); VM_API.action({scheme_id:id,action:'applied_started'}); }
  const data=await VM_API.applySteps(id);
  const steps=data.steps||[]; const total=steps.length;
  let st=getProgress(id,total);
  // Always render paintApply — it now carries the success banner inline so
  // completed applications still show every step (revisitable).
  paintApply(id,s,steps,st);
}
function getProgress(id,total){
  let st=store.get(progressKey(id),null);
  if(!Array.isArray(st)||st.length!==total){ st=Array.from({length:total},(_,i)=>i===0?'current':'locked'); store.set(progressKey(id),st); }
  return st;
}
const allDone=(st)=>st.length>0&&st.every(x=>x==='done');
function completeStep(id,idx,total){ let st=getProgress(id,total); st[idx]='done'; if(idx+1<total)st[idx+1]='current'; store.set(progressKey(id),st); return st; }
function revisitStep(id,idx,total){ let st=Array.from({length:total},(_,i)=>i<idx?'done':i===idx?'current':'locked'); store.set(progressKey(id),st); return st; }
function docsState(s){ const d=s.documents_needed||[]; const ready=Math.ceil(d.length/2); return d.map((x,i)=>({name:x,ready:i<ready})); }
function paintApply(id,s,steps,st){
  const total=steps.length; const done=st.filter(x=>x==='done').length; const curIdx=st.indexOf('current'); const cur=curIdx<0?done:curIdx;
  const pct=Math.round(done/total*100);
  const docs=docsState(s); const readyN=docs.filter(d=>d.ready).length;
  const complete = total>0 && done === total;
  // Stable reference number per scheme, persisted in localStorage.
  let ref = store.get('ref_'+id, null);
  if(complete && !ref){ ref = 'VM-'+Math.floor(10000+Math.random()*89999); store.set('ref_'+id, ref); }
  const v=document.getElementById('view'); v.innerHTML='';
  const wrap=el(`<section class="wrap" data-screen-label="Apply steps">
    <div class="scr-head"><button class="icon-btn" id="a-back" aria-label="Wapas">${svg(I.back,19)}</button>

      <div style="flex:1;min-width:0">

        <small style="color:var(--muted-2);font-size:12.5px">Reference <b style="color:var(--navy);font-family:'Inter',monospace">${esc(ref||'—')}</b> · helpline ${esc(s.helpline_phone||'')}</small>
      </div>
      <button class="btn btn-soft" id="ap-history" style="height:38px;padding:0 12px;font-size:12.5px">Status</button>
    </div>`:''}
    <div class="prog-head"><span>Step <b>${Math.min(cur+1,total)}</b> of ${total} · <span class="hi">${esc((steps[Math.min(cur,total-1)]||{}).title_hi||'')}</span></span><span class="pct">${pct}%</span></div>
    <div class="prog-bar">${Array.from({length:total},(_,i)=>`<div class="seg ${i<done?'on':''}"></div>`).join('')}</div>
    <div class="doc-tray" id="tray">
      <button class="tray-head" id="tray-head"><span class="ic">${svg(I.folder,18)}</span><div class="t"><b class="hi">ज़रूरी कागज़ · Documents</b><small>${docs.length} chahiye · ${readyN} taiyaar ✓</small></div><span class="chev">${svg(I.chevd,18)}</span></button>
      <div class="tray-body">${docs.map(d=>`<div class="dl"><span class="mk ${d.ready?'ready':'miss'}">${d.ready?svg(I.check,11,3):svg(I.warn,11,2.5)}</span><span class="hi">${esc(d.name)}</span><span class="st ${d.ready?'ready':'miss'}">${d.ready?'Taiyaar':'Chahiye'}</span></div>`).join('')}</div>
    </div>
    <div class="steps" id="steps"></div>
  </section>`);
  v.appendChild(wrap);
  const stepsEl=wrap.querySelector('#steps');
  steps.forEach((step,i)=>{
    const stt=st[i];
    const node=el(`<div class="step ${stt}">
      <div class="node">${stt==='done'?svg(I.check,16,2.5):stt==='locked'?`<span class="lockico">${svg(I.lock,15)}</span>`:i+1}</div>
      <div class="body">
        <div class="top"><span class="ti hi">${esc(step.title_hi)}</span>${stt==='done'?'<span class="badge green">कर लिया ✓</span>':stt==='current'?'<span class="badge teal">Abhi</span>':''}</div>
        ${stt==='current'?`<div class="desc hi">${esc(step.body_hi)}</div>

        ${stt==='done'?`<button class="revisit" data-revisit>${svg(I.back,13)} <span class="hi">वापस जाओ</span> · revisit</button>`:''}
      </div></div>`);
    if(stt==='current'){ node.querySelector('[data-done]').addEventListener('click',()=>{
        const ns=completeStep(id,i,total);

      });
      node.querySelector('[data-help]').addEventListener('click',()=> location.hash='#/chat');
    }
    if(stt==='done'){ node.querySelector('[data-revisit]').addEventListener('click',()=>{ const ns=revisitStep(id,i,total); paintApply(id,s,steps,ns); toast('Wapas is kadam par'); }); }

  const tray=wrap.querySelector('#tray'); wrap.querySelector('#tray-head').addEventListener('click',()=> tray.classList.toggle('open'));

/* ═══════════════════ HISTORY ═══════════════════ */
let histFilter='all', histSel=null;
// Stale-while-revalidate cache for /conversations so re-entering History
// shows instantly while a background refresh upgrades the list.
let _histCache = null;
// Build the conversation list from local message store as a fast first
// paint while VM_API.conversations() is in flight.
function _localConversations(){
  try{ return mockConversations(); }catch(e){ return {today:[],week:[],all:[]}; }
}
async function screenHistory(){
  const v=document.getElementById('view'); v.innerHTML='';
  // Frame the screen immediately — chips, header, skeleton list — so the
  // user never stares at a blank canvas while /conversations is pending.
  const wrap=el(`<section class="wrap" data-screen-label="History">
    <div class="scr-head"><div><div class="eyebrow">Pichhli baatein</div><h1 class="h-title hi">इतिहास · History</h1></div></div>
    <div class="chips" style="margin:0 0 18px">
      ${[['today','आज · Aaj'],['week','Pichhla hafta'],['all','Saare · All']].map(([k,l])=>`<button class="pill ${histFilter===k?'active':''}" data-f="${k}">${l}</button>`).join('')}
    </div>
    <div class="hist-grid" id="hist-grid"></div>
  </section>`);
  v.appendChild(wrap);
  wireHistFilters(wrap);
  // Phase 1 — paint from cache (in-memory or localStorage messages).
  // The user sees real entries within a frame instead of waiting for fetch.
  const firstData = _histCache || _localConversations();
  paintHistList(wrap, firstData);
  // Phase 2 — kick the network. Upgrade the UI when it lands.
  VM_API.conversations().then(live=>{
    _histCache = live;
    // Only re-paint if we're still on the History screen.
    if(activeSection() === 'history' && document.getElementById('hist-grid')){
      paintHistList(wrap, live);
    }
  }).catch(()=>{ /* fall back to phase-1 data */ });
}
function paintHistList(wrap, data){
  const grid = wrap.querySelector('#hist-grid');
  if(!grid) return;
  grid.innerHTML = '';
  let items = histFilter==='today' ? data.today : histFilter==='week' ? data.week : data.all;
  if(!items || items.length === 0){
    grid.appendChild(el(`<div class="empty">
      <div class="ic">${svg(I.history,34)}</div>
      <h2 class="hi">Abhi tak koi sawaal nahi</h2>
      <p>Jab aap kuch poochhenge, woh yahan dikhega. Niche se shuru karo:</p>
      <div class="chips" style="margin-top:18px">${['किसान yojana','बेटी ki bachat','Ration card'].map(c=>`<button class="pill" data-seed="${c}">${c}</button>`).join('')}</div>
    </div>`));
    grid.querySelectorAll('[data-seed]').forEach(b=>b.addEventListener('click',()=>{ pendingQuery=b.dataset.seed; location.hash='#/home'; setTimeout(()=>startAsk(b.dataset.seed),60); }));
    return;
  }
  if(!histSel || !items.find(x=>x.id===histSel)) histSel = items[0].id;
  const listCol = el('<div class="hist-list"></div>');
  const now=Date.now(), day=86400000;
  const sub = [
    ['Aaj · Today', it=> now-it.created_at < day],
    ['Pichhla hafta', it=> now-it.created_at >= day && now-it.created_at < day*7],
    ['Purana', it=> now-it.created_at >= day*7],
  ];
  sub.forEach(([lbl,test])=>{
    const g = items.filter(test); if(!g.length) return;
    const gr = el(`<div class="hist-group"><div class="glabel"><span>${lbl.toUpperCase()}</span><span class="ln"></span></div></div>`);
    g.forEach(it=> gr.appendChild(histItem(it)));
    listCol.appendChild(gr);
  });
  grid.appendChild(listCol);
  const detail = el('<aside class="hist-detail"></aside>');
  detail.appendChild(histDetail(items.find(x=>x.id===histSel) || items[0]));
  grid.appendChild(detail);
  // Re-wire the detail-side action buttons that just got injected.
  const open = grid.querySelector('#hd-open'), listen = grid.querySelector('#hd-listen');
  if(open){ open.addEventListener('click',()=> location.hash='#/scheme/'+selSchemeFromHist()); }
  if(listen){ listen.addEventListener('click',async()=>{ const id=selSchemeFromHist(); const ex=await VM_API.explain(id,'short'); speak(ex.explanation_text_hi,ex.explanation_audio_url); toast('Sun rahe ho…',I.speaker); }); }
}
function statusBadge(s){
  const map={Searched:['teal','Searched'],Saved:['amber','Saved'],Applied:['green','Applied'],'In progress':['teal','In progress']};
  const [cls,lbl]=map[s]||['teal',s]; return `<span class="badge ${cls}">${esc(lbl)}</span>`;
}
function relTime(ts){ const d=Date.now()-ts,m=60000,h=3600000,day=86400000; if(d<m)return'abhi'; if(d<h)return Math.floor(d/m)+' min pehle'; if(d<day)return Math.floor(d/h)+' ghante pehle'; return Math.floor(d/day)+' din pehle'; }
function histItem(it){
  const s=SCHEMES[it.scheme_id]||{}; const sel=it.id===histSel;
  const b=el(`<button class="hist-item card ${sel?'sel':''}" data-id="${it.id}">
    <div class="qrow"><small>${esc(relTime(it.created_at))} · ${it.modality==='voice'?'🎙 Bola':'⌨ Likha'}</small>${statusBadge(it.status)}</div>
    <div class="q"><span class="ic">${svg(I.mic,12)}</span><b class="hi">"${esc(it.question)}"</b></div>

  </button>`);
  b.addEventListener('click',()=>{

  });
  return b;
}
function histDetail(it){

  return el(`<div class="card" style="padding:22px">
    <div class="qrow" style="display:flex;justify-content:space-between;margin-bottom:14px"><span class="sec-label">${esc(relTime(it.created_at))}</span>${statusBadge(it.status)}</div>
    <div class="q" style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span class="ic" style="width:30px;height:30px;border-radius:8px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center">${svg(I.mic,15)}</span><b class="hi" style="font-size:16px;color:var(--navy)">"${esc(it.question)}"</b></div>

}
function schemeCardMini(id){
  const s=SCHEMES[id]||{};
  return `<div class="card" style="padding:16px;background:var(--bg)"><div style="font-size:16px;font-weight:700;color:var(--navy)">${esc(s.name_en||'')}</div><div class="nh hi" style="font-size:12.5px;color:var(--muted);margin-top:2px">${esc(s.name_hi||'')}</div><div class="hi" style="font-size:14px;color:var(--text);margin-top:10px;font-weight:600">${esc(s.one_line_pitch_hi||'')}</div></div>`;

function wireHistFilters(wrap){
  wrap.querySelectorAll('[data-f]').forEach(b=>b.addEventListener('click',()=>{ histFilter=b.dataset.f; histSel=null; screenHistory(); }));
  const open=wrap.querySelector('#hd-open'), listen=wrap.querySelector('#hd-listen');
  if(open){ open.addEventListener('click',()=> location.hash='#/scheme/'+selSchemeFromHist()); }

/* ═══════════════════ CHAT (VAANI) ═══════════════════ */
function chatThread(){ return store.get('chat_thread', [
  {role:'assistant', text:'Namaskar! 🙏 Main Vaani hoon — aapki sarkari saathi. Koi bhi yojana ya kaagaz ke baare mein poochho, main asaan bhasha mein bataungi.', mid:'v-greet', time:Date.now()-1000*60*5, quick:['किसान yojana','बेटी ki bachat','Pension','Helpline number']},
]); }
function saveThread(t){ store.set('chat_thread',t); }
async function screenChat(){
  const v=document.getElementById('view'); v.innerHTML='';
  const wrap=el(`<section class="chat" data-screen-label="Vaani chat">
    <div class="chat-head">
      <div class="av">${svg(I.vaani,20)}</div>
      <div class="t"><b>Vaani · वाणी</b><small><span class="d"></span>Online · 24×7</small></div>
      <button class="icon-btn" id="to-voice" aria-label="Voice mode par jao" title="Voice mode">${svg(I.mic,18)}</button>
    </div>
    <div class="chat-body" id="cbody"></div>
    <div class="quick" id="cquick"></div>
    <div class="chat-input"><div class="bar"><input id="cinput" type="text" placeholder="Kuch bhi poochho…" aria-label="Message"><button class="vb" id="cvoice" aria-label="Bolo">${svg(I.mic,16)}</button><button class="send" id="csend" aria-label="Bhejo">${svg(I.send,16)}</button></div></div>
  </section>`);
  v.appendChild(wrap);
  paintThread(wrap);
  const input=wrap.querySelector('#cinput');
  const send=()=>{ const t=input.value.trim(); if(!t) return; input.value=''; sendChat(wrap,t); };
  wrap.querySelector('#csend').addEventListener('click',send);
  input.addEventListener('keydown',e=>{ if(e.key==='Enter') send(); });
  wrap.querySelector('#cvoice').addEventListener('click',()=>{ sendChat(wrap,'Mujhe kisan yojana ke baare mein batao',true); });
  wrap.querySelector('#to-voice').addEventListener('click',()=> location.hash='#/home');
}
function paintThread(wrap){
  const body=wrap.querySelector('#cbody'); const thread=chatThread();
  body.innerHTML='<div class="daysep">Aaj · Today</div>';
  thread.forEach(m=> body.appendChild(chatBubble(m)));
  // wire why links
  body.querySelectorAll('[data-why]').forEach(b=>b.addEventListener('click',()=> openWhyModal({message_id:b.dataset.why})));
  // quick replies from last assistant
  const cq=wrap.querySelector('#cquick'); cq.innerHTML='';
  const last=[...thread].reverse().find(m=>m.role==='assistant');
  if(last&&last.quick){ last.quick.forEach(q=>{ const p=el(`<button class="pill xs">${esc(q)}</button>`); p.addEventListener('click',()=>sendChat(wrap,q)); cq.appendChild(p); }); }
  body.scrollTop=body.scrollHeight;
}
function chatBubble(m){
  if(m.role==='user') return el(`<div class="msg user"><div class="av" aria-hidden="true">${svg('<circle cx="12" cy="8" r="4"/><path d="M4 22c0-4.4 3.6-8 8-8s8 3.6 8 8"/>',14)}</div><div><div class="bub hi">${esc(m.text)}</div></div></div>`);
  const card = m.scheme_id?schemeChatCard(m.scheme_id):'';
  const node=el(`<div class="msg"><div class="av">${svg(I.vaani,15)}</div><div style="min-width:0"><div class="bub hi">${esc(m.text)}</div>${card}<a class="why-link" data-why="${esc(m.mid||'')}" role="button" tabindex="0">${svg(I.q,13)}<span class="hi">समझाओ</span> · Why this?</a></div></div>`);
  if(m.scheme_id){ node.querySelector('[data-open]').addEventListener('click',()=> location.hash='#/scheme/'+m.scheme_id); }
  return node;
}
function schemeChatCard(id){
  const s=SCHEMES[id]||{};
  return `<button class="card" data-open style="display:block;text-align:left;width:100%;padding:13px;margin-top:8px;background:var(--bg)">
    <div style="font-size:13.5px;font-weight:700;color:var(--navy)">${esc(s.name_en)}</div>
    <div class="hi" style="font-size:14px;font-weight:700;color:var(--primary);margin-top:4px">${esc(s.one_line_pitch_hi||'')}</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--primary);font-weight:600;margin-top:9px">Yojana kholo ${svg(I.arrow,13)}</div>
  </button>`;
}
async function sendChat(wrap,text,voice){
  const thread=chatThread();
  thread.push({role:'user',text,time:Date.now()});
  saveThread(thread); paintThread(wrap);
  // typing
  const body=wrap.querySelector('#cbody');
  const typing=el('<div class="msg"><div class="av">'+svg(I.vaani,15)+'</div><div class="typing"><i></i><i></i><i></i></div></div>');
  body.appendChild(typing); body.scrollTop=body.scrollHeight;
  let resp; try{ resp= voice?await VM_API.voice(new Blob(), lowData?'low':'high'):await VM_API.chat(text); }catch(e){ resp=mockChat(text); }
  const top=(resp.top_3_schemes||[])[0]||{};
  const t2=chatThread();
  t2.push({role:'assistant', text:resp.response_text_hi, mid:resp.message_id, scheme_id:top.scheme_id, time:Date.now(), quick:['Apply kaise?','Aur options','Kaagaz kya chahiye','Helpline']});
  saveThread(t2);
  // log to messages history
  const msgs=store.get('messages',SAMPLE_MESSAGES.slice());
  msgs.unshift({id:resp.message_id,role:'user',modality:voice?'voice':'text',content_text:text,retrieved_schemes:(resp.top_3_schemes||[]).map(s=>s.scheme_id),created_at:Date.now(),status:'Searched',scheme_id:top.scheme_id||'pmjdy'});
  store.set('messages',msgs);
  paintThread(wrap);
}

/* ═══════════════════ WHY MODAL ═══════════════════ */

  const scrim=el('<div class="scrim"></div>');
  scrim.innerHTML=`<div class="sheet" role="dialog" aria-modal="true" aria-label="Yeh kaise pata chala"><div class="handle"></div><button class="x" aria-label="Band karo">${svg(I.x,20)}</button>
    <h2 class="hi">यह कैसे पता चला?<span class="en">Yeh kaise pata chala? · why we said this</span></h2>
    <div id="why-load" style="padding:18px 0"><div class="skel" style="width:90%;margin-bottom:8px"></div><div class="skel" style="width:75%"></div></div>
    <div id="why-content" style="display:none;display:flex;flex-direction:column;gap:16px"></div>
  </div>`;

  if(!ex){ const cached=lastResponse&&lastResponse.explanations&&lastResponse.explanations[0]; ex = cached?{span_text:cached.span_text,why_hi:cached.why_hi,source_url:cached.source_url,feedback_summary:{up:3812,down:218}}:mockExplanation(); }
  const fb=ex.feedback_summary||{up:3812,down:218}; const tot=fb.up+fb.down; const pct=tot?Math.round(fb.up/tot*100):87;
  const c=scrim.querySelector('#why-content'); scrim.querySelector('#why-load').style.display='none'; c.style.display='flex';
  c.innerHTML=`
    <div><span class="sec-label" style="color:var(--primary)">Kyon sahi lag raha hai</span><p class="why-p"><span class="hi">${esc(ex.why_hi||'')}</span></p></div>
    <div><span class="sec-label">Source</span>
      <div style="display:flex;align-items:center;gap:8px;margin-top:6px"><span style="width:18px;height:18px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center">${svg(I.check,10,3.5)}</span><span style="font-size:13px;font-weight:600;color:var(--green)" class="hi">सरकारी सोर्स · verified</span></div>
      <a href="${esc(ex.source_url||'#')}" target="_blank" rel="noopener" style="color:var(--primary);font-size:13px;font-weight:500;text-decoration:underline;text-underline-offset:3px;word-break:break-all;display:inline-block;margin-top:6px">${esc((ex.source_url||'').replace(/^https?:\/\//,''))}</a>
    </div>
    <div><span class="sec-label">Confidence</span>
      <div class="conf-row">
        <div class="conf-card green on"><span class="ic">${svg(I.check,15,3)}</span><div><b class="hi">पक्की जानकारी</b><small>Verified · official</small></div></div>
        <div class="conf-card amber"><span class="ic">${svg(I.info,15)}</span><div><b class="hi">अंदाज़ा है</b><small>Best guess · verify</small></div></div>
      </div>
    </div>
    <div class="social"><span class="txt"><b>${pct}% logon</b> ke liye sahi tha · ${tot.toLocaleString('en-IN')} votes</span><span class="bar"><i style="width:${pct}%"></i></span></div>
    <button class="btn btn-ghost btn-full" id="why-report" style="border-color:var(--accent);color:var(--accent)">${svg(I.warn,16)} <span class="hi">ग़लत लग रहा है? बताइए</span></button>`;
  c.querySelector('#why-report').addEventListener('click',()=>{ VM_API.feedback({vote:'down',chips:['why-modal'],message_id:opts.message_id||''}); toast('Shukriya — dekh lenge'); close(); });
