/* ═══════════════════ PWA INSTALL ═══════════════════ */
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredInstall=e; const ib=document.getElementById('install-btn'); if(ib){ ib.style.display='flex'; ib.onclick=doInstall; } });
async function doInstall(){ if(!deferredInstall) return; deferredInstall.prompt(); try{ await deferredInstall.userChoice; }catch(e){} deferredInstall=null; const ib=document.getElementById('install-btn'); if(ib) ib.style.display='none'; }

/* ═══════════════════ ROUTER ═══════════════════ */
function parseRoute(){ const h=location.hash||'#/home'; const parts=h.replace(/^#\//,'').split('/'); return {name:parts[0]||'home', id:parts[1]||null}; }
async function router(){
  stopAudio();
  // Belt-and-suspenders: force the slide-in drawer closed before every
  // route render. Without this, the scrim can stick around after a
  // navigation and "blacks out" the next screen (the History bug).
  const _d = document.getElementById('menu-drawer');
  if(_d){ _d.classList.remove('open'); _d.setAttribute('aria-hidden','true'); }
  const r=parseRoute();
  renderShell();
  const view=document.getElementById('view');
  try{
    if(r.name==='home') screenHome();
    else if(r.name==='schemes') await screenSchemes();
    else if(r.name==='scheme') await screenDetail(r.id);
    else if(r.name==='apply') await screenApply(r.id);
    else if(r.name==='history') await screenHistory();
    else if(r.name==='saved') screenSaved();
    else if(r.name==='myapps' || r.name==='applied') screenMyApps();
    else if(r.name==='chat') await screenChat();
    else { location.hash='#/home'; return; }
  }catch(e){ view.innerHTML='<section class="wrap"><p style="color:var(--muted-2);padding:40px 0">Kuch gadbad ho gayi. <a href="#/home" style="color:var(--primary)">Ghar jao</a></p></section>'; console.error(e); }
  view.focus({preventScroll:true});
  if(r.name!=='chat') window.scrollTo(0,0);
}
function boot(){
  if(!location.hash) location.hash='#/home';
  window.addEventListener('hashchange',router);
  router();
}

/* ─────────── VIEWPORT SIMULATOR ─────────── */
(function(){
  const fab = document.getElementById('vp-fab');
  const menu = document.getElementById('vp-menu');
  const label = document.getElementById('vp-label');
  if(!fab || !menu) return;
  const LABEL = {auto:'Auto', mobile:'Mobile', tablet:'Tablet', desktop:'Desktop'};
  function apply(vp){
    if(vp === 'auto'){ document.body.removeAttribute('data-viewport'); }
    else { document.body.setAttribute('data-viewport', vp); }
    label.textContent = LABEL[vp] || 'Auto';
    menu.querySelectorAll('[data-vp]').forEach(b=> b.setAttribute('aria-pressed', b.dataset.vp === vp ? 'true' : 'false'));
    try{ localStorage.setItem('vm_viewport', vp); }catch(e){}
    // The shell layout depends on which viewport class is active — re-render
    // so nav highlights and crumbs settle to the right place.
    if(typeof renderShell === 'function') renderShell();
  }
  function toggle(){
    const open = menu.classList.toggle('open');
    fab.setAttribute('aria-expanded', open ? 'true' : 'false');
  }
  fab.addEventListener('click',(e)=>{ e.stopPropagation(); toggle(); });
  menu.querySelectorAll('[data-vp]').forEach(b=> b.addEventListener('click',(e)=>{ e.stopPropagation(); apply(b.dataset.vp); menu.classList.remove('open'); fab.setAttribute('aria-expanded','false'); }));
  document.addEventListener('click',(e)=>{ if(!menu.contains(e.target) && e.target !== fab){ menu.classList.remove('open'); fab.setAttribute('aria-expanded','false'); } });
  document.addEventListener('keydown',(e)=>{ if(e.key === 'Escape'){ menu.classList.remove('open'); fab.setAttribute('aria-expanded','false'); } });
  // Restore last choice across sessions.
  let saved = 'auto';
  try{ saved = localStorage.getItem('vm_viewport') || 'auto'; }catch(e){}
  apply(saved);
})();

/* ─────────── SERVICE WORKER ─────────── */
// Register sw.js so the schemes/explain/audio caches kick in. The SW posts
// 'vm-offline' when a network-only write (voice/chat/feedback/action) fails
// while offline — surface a toast so the user knows the demo can't reach the
// backend right now.
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('/sw.js').catch(()=>{ /* ok offline */ });
    navigator.serviceWorker.addEventListener('message', (e)=>{
      if(e.data && e.data.type === 'vm-offline'){
        toast('Internet nahi mil raha · backend offline', I.warn);
      }
    });
  });
}

/* ─────────── BOOT ─────────── */
boot();
